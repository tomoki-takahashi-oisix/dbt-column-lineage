version: 2
updates:
  # Python backend (pyproject.toml / requirements.txt)
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      python-minor-patch:
        update-types: ["minor", "patch"]

  # Next.js frontend
  - package-ecosystem: npm
    directory: "/frontend"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Many small frontend deps — batch non-major bumps into one PR to cut noise.
      npm-minor-patch:
        update-types: ["minor", "patch"]

  # GitHub Actions used by the CI workflow
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]
